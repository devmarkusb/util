name: release tag

# Manual fallback only. Normal releases tag from ci.yml after all CI jobs pass.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-release-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for annotated release tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync git tag v{VERSION} from CMakeLists.txt
        run: python3 scripts/sync-release-tag.py --push-if-missing
