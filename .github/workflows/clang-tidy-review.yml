name: clang-tidy

env:
  CLANG_CONTAINER_IMAGE: ghcr.io/bemanproject/infra-containers-clang:latest

on:
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.h"
      - "**/*.hh"
      - "**/*.hpp"
      - "**/*.hxx"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "devenv/cmake/**"
      - "devenv/clang-tidy-review.py"
      - ".github/workflows/clang-tidy-review.yml"
      - ".github/clang-tidy-problem-matcher.json"
  push:
    branches:
      - main
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.h"
      - "**/*.hh"
      - "**/*.hpp"
      - "**/*.hxx"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "**/CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "devenv/cmake/**"
      - "devenv/clang-tidy-review.py"
      - ".github/workflows/clang-tidy-review.yml"
      - ".github/clang-tidy-problem-matcher.json"
  schedule:
    - cron: "17 4 * * 0"
  workflow_dispatch:

concurrency:
  group: clang-tidy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changed-lines:
    name: changed lines
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: ${{ env.CLANG_CONTAINER_IMAGE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Trust workspace for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Add clang-tidy problem matcher
        run: echo "::add-matcher::.github/clang-tidy-problem-matcher.json"

      - name: Run clang-tidy on changed lines
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          python3 ./devenv/clang-tidy-review.py changed --base "${base_sha}" --head "${{ github.sha }}"

  full-project:
    name: full project
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ${{ env.CLANG_CONTAINER_IMAGE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Trust workspace for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Add clang-tidy problem matcher
        run: echo "::add-matcher::.github/clang-tidy-problem-matcher.json"

      - name: Run clang-tidy on the full codebase
        shell: bash
        run: |
          set -euo pipefail

          report_dir="${RUNNER_TEMP}/clang-tidy"
          report_file="${report_dir}/full-project.txt"
          mkdir -p "${report_dir}"
          python3 ./devenv/clang-tidy-review.py full --report-file "${report_file}"

      - name: Upload full scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: clang-tidy-full-project-report
          path: ${{ runner.temp }}/clang-tidy/full-project.txt
          if-no-files-found: ignore
