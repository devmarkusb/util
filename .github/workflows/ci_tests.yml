name: continuous integration tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  preset-test:
    uses: devmarkusb/gh-workflows/.github/workflows/preset-test.yml@main
    with:
      matrix_config: >
        [
          {"preset": "gcc-debug", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "gcc-release", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "clang-debug", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "clang-release", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "appleclang-debug", "runner": "macos-latest"},
          {"preset": "appleclang-release", "runner": "macos-latest"},
          {"preset": "msvc-debug", "runner": "windows-latest"},
          {"preset": "msvc-release", "runner": "windows-latest"}
        ]

  build-and-test:
    uses: devmarkusb/gh-workflows/.github/workflows/build-and-test.yml@main
    with:
      matrix_config: >
        {
          "gcc": [
            { "versions": ["15"],
              "tests": [
                { "cxxversions": ["c++26"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Debug.Default", "Release.Default", "Release.TSan",
                        "Release.MaxSan", "Debug.MaxError", "Release.MaxError",
                        "Debug.Coverage"
                      ]
                    }
                  ]
                }
              ]
            },
            { "versions": ["14"],
              "tests": [
                { "cxxversions": ["c++26", "c++23"],
                  "tests": [{ "stdlibs": ["libstdc++"], "tests": ["Release.Default"]}]
                }
              ]
            }
          ],
          "clang": [
            { "versions": ["21"],
              "tests": [
                {"cxxversions": ["c++26"],
                  "tests": [
                    { "stdlibs": ["libstdc++", "libc++"],
                      "tests": [
                        "Debug.Default", "Release.Default", "Release.TSan",
                        "Release.MaxSan", "Debug.MaxError", "Release.MaxError"
                      ]
                    }
                  ]
                }
              ]
            },
            { "versions": ["18"],
              "tests": [
                { "cxxversions": ["c++26", "c++23"],
                  "tests": [{"stdlibs": ["libc++"], "tests": ["Release.Default"]}]
                }
              ]
            }
          ],
          "appleclang": [
            { "versions": ["latest"],
              "tests": [
                { "cxxversions": ["c++26"],
                  "tests": [{ "stdlibs": ["libc++"], "tests": ["Debug.Default"]}]
                }
              ]
            }
          ],
          "msvc": [
            { "versions": ["latest"],
              "tests": [
                { "cxxversions": ["c++23"],
                  "tests": [
                    { "stdlibs": ["stl"],
                      "tests": ["Debug.Default", "Release.MaxSan", "Debug.MaxError"]
                    }
                  ]
                }
              ]
            }
          ]
        }

